<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" href="VinalogoFAV.png" type="image/png">
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
<title>Đổi điểm thưởng – Vinapharma</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Be Vietnam Pro',sans-serif;background:#f5f5f5;color:#111;min-height:100vh}
:root{--red:#cc1f1f;--red-pale:#fff5f5}
.header{background:#fff;padding:.9rem 4%;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e8e8e8}
.logo{font-weight:900;font-size:1.1rem;color:#111;text-decoration:none}
.logo span{color:var(--red)}
.back-btn{display:flex;align-items:center;gap:.5rem;color:#666;text-decoration:none;font-size:.83rem;font-weight:600;white-space:nowrap}
.page{max-width:900px;margin:2rem auto;padding:0 1rem}

/* Points hero */
.points-hero{background:linear-gradient(135deg,#cc1f1f,#e84646);border-radius:1rem;padding:1.6rem 2rem;color:#fff;display:flex;align-items:center;justify-content:space-between;margin-bottom:1.8rem;flex-wrap:wrap;gap:1rem}
.points-hero-left h2{font-size:1rem;font-weight:700;opacity:.85;margin-bottom:.3rem}
.points-hero-left .pts-big{font-size:2.4rem;font-weight:900;line-height:1}
.points-hero-left .pts-sub{font-size:.75rem;opacity:.75;margin-top:.3rem}
.points-hero-right{text-align:right}
.rank-pill{display:inline-flex;align-items:center;gap:.5rem;background:rgba(255,255,255,.2);border-radius:999px;padding:.5rem 1rem;font-size:.9rem;font-weight:800}
.how-to{font-size:.72rem;opacity:.75;margin-top:.4rem}

/* Section title */
.sec-title{font-size:1rem;font-weight:800;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
.sec-title span{background:#fff;border:1px solid #e8e8e8;border-radius:999px;padding:.15rem .65rem;font-size:.72rem;font-weight:700;color:#666}

/* Reward grid */
.reward-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.2rem;margin-bottom:2rem}
.reward-card{background:#fff;border-radius:.8rem;border:1px solid #e8e8e8;overflow:hidden;transition:.2s;position:relative}
.reward-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.1);transform:translateY(-2px)}
.reward-card.btob-only{border-color:#3b82f6}
.btob-badge{position:absolute;top:.6rem;right:.6rem;background:#3b82f6;color:#fff;font-size:.6rem;font-weight:800;padding:.2rem .5rem;border-radius:999px}
.reward-img{width:100%;aspect-ratio:1/1;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:3rem;overflow:hidden}
.reward-img img{width:100%;height:100%;object-fit:cover;display:block}
/* Points sort */
.pts-sort{display:flex;align-items:center;gap:.5rem;margin-bottom:1.1rem}
.pts-sort span{font-size:.78rem;font-weight:700;color:#555}
.sort-btn{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;border:1.5px solid #e0e0e0;background:#fff;font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer;transition:.15s;color:#555}
.sort-btn:hover{border-color:var(--red);color:var(--red)}
.sort-btn.active{background:var(--red);color:#fff;border-color:var(--red)}
.reward-body{padding:1rem}
.reward-name{font-size:.88rem;font-weight:800;margin-bottom:.3rem}
.reward-desc{font-size:.75rem;color:#888;margin-bottom:.8rem;line-height:1.4}
.reward-pts{font-size:.78rem;color:var(--red);font-weight:700;margin-bottom:.8rem}
.reward-pts strong{font-size:1rem}
.btn-redeem{width:100%;padding:.55rem;border:none;border-radius:.4rem;background:var(--red);color:#fff;font-family:inherit;font-size:.82rem;font-weight:700;cursor:pointer;transition:.15s}
.btn-redeem:hover{background:#a01818}
.btn-redeem:disabled{background:#ccc;cursor:not-allowed}
.reward-stock{font-size:.7rem;color:#aaa;margin-top:.4rem;text-align:center}

/* History */
.history-table{width:100%;border-collapse:collapse;background:#fff;border-radius:.8rem;overflow:hidden;border:1px solid #e8e8e8;margin-bottom:2rem}
.history-table th{padding:.65rem 1rem;font-size:.7rem;font-weight:800;color:#888;text-transform:uppercase;background:#fafafa;border-bottom:1px solid #f0f0f0;text-align:left}
.history-table td{padding:.65rem 1rem;font-size:.82rem;border-bottom:1px solid #f5f5f5}
.history-table tr:last-child td{border-bottom:none}
.status-pill{display:inline-flex;align-items:center;gap:.3rem;padding:.2rem .6rem;border-radius:999px;font-size:.7rem;font-weight:700}
.status-pending{background:#fef3c7;color:#92400e}
.status-fulfilled{background:#dcfce7;color:#166534}
.status-cancelled{background:#fee2e2;color:#dc2626}
.empty{text-align:center;padding:2.5rem;color:#aaa;font-size:.85rem}

.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#111;color:#fff;padding:.75rem 1.2rem;border-radius:.5rem;font-size:.82rem;font-weight:600;transform:translateY(80px);opacity:0;transition:.25s;z-index:1000009}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{background:#16a34a}
.toast.error{background:#dc2626}
.history-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
@media(max-width:500px){
  .points-hero{padding:1.2rem 1.2rem}
  .points-hero-left .pts-big{font-size:1.9rem}
  .pts-sort span{display:none}
  .sort-btn{padding:.25rem .6rem;font-size:.7rem}
  .history-table th,.history-table td{padding:.45rem .55rem;font-size:.72rem}
  .sec-title{font-size:.88rem}
}
</style>
</head>
<body>
<div class="header">
  <a href="index.html" class="logo"><img src="logo-header.png" alt="Vinapharma" style="height:36px;display:block"></a>
  <a href="thong-tin-tai-khoan.html" class="back-btn">← Tài khoản</a>
</div>

<div class="page">
  <!-- Points hero -->
  <div class="points-hero">
    <div class="points-hero-left">
      <h2>Điểm thưởng của bạn</h2>
      <div class="pts-big" id="heroPoints">–</div>
      <div class="pts-sub">điểm khả dụng &nbsp;|&nbsp; <span id="heroPtsNote">1 điểm = 10.000 ₫</span></div>
    </div>
    <div class="points-hero-right">
      <div class="rank-pill" id="heroRank">–</div>
      <div class="how-to" id="heroTotalSpent"></div>
    </div>
  </div>

  <!-- Tabs -->
  <div id="rewardTabs" style="display:flex;gap:0;border-bottom:2px solid #e8e8e8;margin-bottom:1.2rem">
    <button id="tabNormal" onclick="switchRewardTab('normal')" style="padding:.6rem 1.4rem;font-size:.88rem;font-weight:800;border:none;background:none;cursor:pointer;border-bottom:3px solid #cc1f1f;color:#cc1f1f;margin-bottom:-2px"><i class="fa-solid fa-gift"></i> Đổi Thưởng</button>
    <button id="tabVip" onclick="switchRewardTab('vip')" style="display:none;padding:.6rem 1.4rem;font-size:.88rem;font-weight:800;border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;color:#6b7280;margin-bottom:-2px"><i class="fa-solid fa-crown" style="color:#1d4ed8"></i> Đổi Thưởng VIP</button>
  </div>

  <!-- Đổi Thưởng (thường) -->
  <div id="sectionNormal">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
      <div class="sec-title" style="margin-bottom:0"><i class="fa-solid fa-gift" style="color:#cc1f1f"></i> Đổi Thưởng</div>
      <div class="pts-sort">
        <span>Sắp xếp:</span>
        <button class="sort-btn active" id="sortNormalAsc" onclick="sortRewards('normal','asc')" title="Điểm thấp đến cao">&#8593;</button>
        <button class="sort-btn" id="sortNormalDesc" onclick="sortRewards('normal','desc')" title="Điểm cao đến thấp">&#8595;</button>
      </div>
    </div>
    <div class="reward-grid" id="allRewards"><div class="empty">Đang tải...</div></div>
  </div>

  <!-- Đổi Thưởng VIP (chỉ hiện với BtoB) -->
  <div id="sectionVip" style="display:none">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
      <div class="sec-title" style="margin-bottom:0"><i class="fa-solid fa-crown" style="color:#1d4ed8"></i> Đổi Thưởng VIP</div>
      <div class="pts-sort">
        <span>Sắp xếp:</span>
        <button class="sort-btn active" id="sortVipAsc" onclick="sortRewards('vip','asc')" title="Điểm thấp đến cao">&#8593;</button>
        <button class="sort-btn" id="sortVipDesc" onclick="sortRewards('vip','desc')" title="Điểm cao đến thấp">&#8595;</button>
      </div>
    </div>
    <div class="reward-grid" id="btobRewards"></div>
  </div>

  <!-- Lịch sử đổi thưởng -->
  <div class="sec-title" style="margin-top:.5rem"><i class="fa-solid fa-clock" style="color:#6b7280"></i> Lịch sử đổi thưởng</div>
  <div class="history-wrap"><table class="history-table">
    <thead><tr><th>Phần thưởng</th><th>Điểm dùng</th><th>Trạng thái</th><th>Ngày đổi</th></tr></thead>
    <tbody id="historyBody"><tr><td colspan="4" class="empty">Đang tải...</td></tr></tbody>
  </table></div>
</div>

<div class="toast" id="toast"></div>
<script src="authClient.js"></script>
<script src="rank-icons.js"></script>
<script>
const API = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') ? 'http://localhost:5000' : 'https://vinapharma-pwv2.onrender.com';
let currentUser = null;
let availablePoints = 0;
let _normalList = [];
let _vipList = [];

function sortRewards(tab, dir) {
  const list = (tab === 'vip' ? _vipList : _normalList).slice();
  const gridId = tab === 'vip' ? 'btobRewards' : 'allRewards';
  const prefix = tab === 'vip' ? 'sortVip' : 'sortNormal';
  document.getElementById(prefix + 'Asc').classList.toggle('active', dir === 'asc');
  document.getElementById(prefix + 'Desc').classList.toggle('active', dir === 'desc');
  list.sort(function(a, b) { return dir === 'asc' ? a.pointsRequired - b.pointsRequired : b.pointsRequired - a.pointsRequired; });
  const div = document.getElementById(gridId);
  div.innerHTML = list.length ? list.map(rewardCardHTML).join('') : '<div class="empty">Chưa có phần thưởng nào</div>';
}

const RANK_ORDER = ['thanh-vien','dong','bac','vang','kim-cuong'];
const RANK_INFO = {
  'thanh-vien': { label:'Thành Viên' },
  'dong':       { label:'Đồng'       },
  'bac':        { label:'Bạc'        },
  'vang':       { label:'Vàng'       },
  'kim-cuong':  { label:'Kim Cương'  }
};

function switchRewardTab(tab) {
  const isVip = tab === 'vip';
  document.getElementById('sectionNormal').style.display = isVip ? 'none' : 'block';
  document.getElementById('sectionVip').style.display   = isVip ? 'block' : 'none';
  document.getElementById('tabNormal').style.borderBottomColor = isVip ? 'transparent' : '#cc1f1f';
  document.getElementById('tabNormal').style.color = isVip ? '#6b7280' : '#cc1f1f';
  document.getElementById('tabVip').style.borderBottomColor = isVip ? '#1d4ed8' : 'transparent';
  document.getElementById('tabVip').style.color = isVip ? '#1d4ed8' : '#6b7280';
}
function getPointsRate(rank) {
  if (rank === 'kim-cuong') return 9000;
  if (rank === 'vang')      return 9500;
  return 10000;
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.innerHTML = msg; t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3000);
}

function rewardCardHTML(r) {
  const pointsOk   = availablePoints >= r.pointsRequired;
  const outOfStock = r.stock === 0;
  const canRedeem  = pointsOk && !outOfStock;

  const imgHTML = r.image
    ? `<div class="reward-img"><img src="${r.image.startsWith('http') ? r.image : API + r.image}" alt="${r.name}"/></div>`
    : `<div class="reward-img"><i class="fa-solid fa-medal" style="color:#d97706;font-size:3rem"></i></div>`;

  const stockText = r.stock === -1 ? '' : r.stock === 0
    ? '<div class="reward-stock"><i class="fa-solid fa-triangle-exclamation" style="color:#d97706"></i> Hết hàng</div>'
    : `<div class="reward-stock">Còn ${r.stock} phần thưởng</div>`;

  let btnLabel;
  if (outOfStock)  { btnLabel = '<i class="fa-solid fa-circle-xmark"></i> Hết hàng'; }
  else if (!pointsOk){ btnLabel = `<i class="fa-solid fa-circle-xmark"></i> Cần thêm ${(r.pointsRequired - availablePoints).toLocaleString('vi-VN')} điểm`; }
  else             { btnLabel = '<i class="fa-solid fa-gift" style="color:#cc1f1f"></i> Đổi ngay'; }

  return `
    <div class="reward-card">
      ${imgHTML}
      <div class="reward-body">
        <div class="reward-name">${r.name}</div>
        <div class="reward-desc">${r.description || ''}</div>
        <div class="reward-pts">Cần <strong>${r.pointsRequired.toLocaleString('vi-VN')}</strong> điểm</div>
        <button class="btn-redeem" ${!canRedeem ? 'disabled' : ''} onclick="redeem('${r._id}','${r.name}',${r.pointsRequired})">
          ${btnLabel}
        </button>
        ${stockText}
      </div>
    </div>`;
}

async function loadRewards() {
  try {
    const res  = await fetch(`${API}/api/rewards`);
    const data = await res.json();
    if (!data.success) return;
    const rewards = data.data;
    const isBtoB  = currentUser?.userType === 'btob';

    _normalList = rewards.filter(r => r.type === 'all');
    _vipList    = rewards.filter(r => r.type === 'btob');
    const normalList = _normalList;
    const vipList    = _vipList;

    const allDiv  = document.getElementById('allRewards');
    const btobDiv = document.getElementById('btobRewards');

    allDiv.innerHTML = normalList.length
      ? normalList.map(r => rewardCardHTML(r)).join('')
      : '<div class="empty">Chưa có phần thưởng nào</div>';

    if (isBtoB) {
      document.getElementById('tabVip').style.display = 'inline-block';
      btobDiv.innerHTML = vipList.length
        ? vipList.map(r => rewardCardHTML(r)).join('')
        : '<div class="empty">Chưa có phần thưởng VIP nào</div>';
    }
  } catch(e) { console.error(e); }
}

async function loadHistory() {
  try {
    const res  = await AuthClient.authFetch(`${API}/api/redemptions/mine`);
    const data = await res.json();
    const tbody = document.getElementById('historyBody');
    if (!data.success || !data.data.length) {
      tbody.innerHTML = '<tr><td colspan="4" class="empty">Chưa có lịch sử đổi thưởng</td></tr>'; return;
    }
    tbody.innerHTML = data.data.map(rd => {
      const statusMap = { pending:'status-pending', fulfilled:'status-fulfilled', cancelled:'status-cancelled' };
      const statusLabel = { pending:'⏳ Chờ xử lý', fulfilled:'<i class="fa-solid fa-circle-check" style="color:#16a34a"></i> Hoàn thành', cancelled:'<i class="fa-solid fa-circle-xmark" style="color:#dc2626"></i> Đã hủy' };
      const d = new Date(rd.createdAt);
      const dateStr = d.toLocaleDateString('vi-VN', { day:'2-digit', month:'2-digit', year:'numeric' });
      return `<tr>
        <td><b>${rd.rewardName || rd.reward?.name || '–'}</b></td>
        <td>${(rd.pointsUsed||0).toLocaleString('vi-VN')} điểm</td>
        <td><span class="status-pill ${statusMap[rd.status]||''}">${statusLabel[rd.status]||rd.status}</span></td>
        <td>${dateStr}</td>
      </tr>`;
    }).join('');
  } catch(e) {}
}

async function redeem(rewardId, rewardName, pointsRequired) {
  if (!confirm(`Đổi "${rewardName}" với ${pointsRequired.toLocaleString('vi-VN')} điểm?`)) return;
  try {
    const res  = await AuthClient.authFetch(`${API}/api/redemptions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ rewardId })
    });
    const data = await res.json();
    if (data.success) {
      showToast('<i class="fa-solid fa-party-horn" style="color:#cc1f1f"></i> ' + data.message, 'success');
      availablePoints = data.newPoints;
      document.getElementById('heroPoints').textContent = availablePoints.toLocaleString('vi-VN');
      loadRewards();
      loadHistory();
    } else {
      showToast(data.message, 'error');
    }
  } catch(e) { showToast('Lỗi kết nối', 'error'); }
}

window.__vpAuthReady.then(async function(user) {
  if (!user) { window.location.href = 'tai-khoan.html'; return; }

  // Lấy thông tin mới nhất từ /api/auth/me
  try {
    const res  = await AuthClient.authFetch(`${API}/api/auth/me`);
    const data = await res.json();
    if (data.success) {
      currentUser      = data.user;
      const rank       = data.user.rank || 'thanh-vien';
      const rate       = getPointsRate(rank);
      availablePoints  = Math.max(0, Math.floor((data.user.totalSpent || 0) / rate) + (data.user.bonusPoints || 0) - (data.user.redeemedPoints || 0));
      const rk = RANK_INFO[rank];

      document.getElementById('heroPoints').textContent     = availablePoints.toLocaleString('vi-VN');
      document.getElementById('heroRank').innerHTML         = rankIconSVG(rank, 18, true) + ' ' + (rk?.label || 'Thành Viên');
      document.getElementById('heroTotalSpent').textContent = 'Tổng chi tiêu: ' + (data.user.totalSpent || 0).toLocaleString('vi-VN') + ' ₫';
      document.getElementById('heroPtsNote').textContent = '1 điểm = ' + rate.toLocaleString('vi-VN') + ' ₫';

      await loadRewards();
      await loadHistory();
    }
  } catch(e) {}
});
</script>
<button id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Về đầu trang" style="position:fixed;bottom:100px;right:24px;width:44px;height:44px;border-radius:50%;background:#cc1f1f;color:#fff;border:none;cursor:pointer;font-size:1.1rem;box-shadow:0 4px 12px rgba(204,31,31,.35);display:none;align-items:center;justify-content:center;z-index:100000;transition:opacity .2s"><i class="fa-solid fa-chevron-up"></i></button>
<script>
(function(){var b=document.getElementById('backToTop');window.addEventListener('scroll',function(){b.style.display=window.scrollY>300?'flex':'none';});})();
</script>
<script src="chat-widget.js"></script>
</body>
</html>
