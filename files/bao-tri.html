<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Đang bảo trì – Vinapharma</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#cc1f1f}
body{font-family:'Be Vietnam Pro',sans-serif;background:#f8f8f8;color:#111;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
.card{background:#fff;border-radius:1.2rem;padding:3.5rem 3rem;max-width:480px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.08)}
.logo{margin-bottom:2rem}
.logo img{height:36px}
.logo-text{font-size:1.25rem;font-weight:900;color:var(--red);letter-spacing:.04em}
.icon-wrap{width:80px;height:80px;background:#fff5f5;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;font-size:2.2rem}
.title{font-size:1.5rem;font-weight:900;margin-bottom:.65rem;color:#111}
.sub{font-size:.9rem;color:#666;line-height:1.7;margin-bottom:1.8rem}
.divider{height:1px;background:#f0f0f0;margin-bottom:1.8rem}
.contact-label{font-size:.65rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#aaa;margin-bottom:.75rem}
.contact-list{list-style:none;display:flex;flex-direction:column;gap:.55rem}
.contact-list li{font-size:.88rem;color:#555;display:flex;align-items:center;justify-content:center;gap:.5rem}
.contact-list a{color:var(--red);text-decoration:none;font-weight:700}
.contact-list a:hover{text-decoration:underline}
.footer-note{margin-top:2rem;font-size:.75rem;color:#bbb}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-text">VINAPHARMA</div>
  </div>
  <div class="icon-wrap">🔧</div>
  <div class="title">Website đang bảo trì</div>
  <div class="sub">Chúng tôi đang nâng cấp hệ thống để mang lại trải nghiệm tốt hơn cho bạn. Vui lòng quay lại sau.</div>
  <div class="divider"></div>
  <div class="contact-label">Liên hệ trong thời gian này</div>
  <ul class="contact-list">
    <li>📞 Hotline: <a href="tel:19001234">1900 1234</a></li>
    <li>✉️ Email: <a href="mailto:info@vinapharma.vn">info@vinapharma.vn</a></li>
  </ul>
</div>
<div class="footer-note">© 2025 Vinapharma. Cảm ơn bạn đã thông cảm.</div>
</body>
</html>
